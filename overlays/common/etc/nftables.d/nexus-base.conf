#!/usr/sbin/nft -f
# NexusOS — Base nftables ruleset (common overlay)
# Included by /etc/nftables.conf

# Stateful firewall — default deny inbound, allow established

table inet nexus_base {
    chain input {
        type filter hook input priority filter; policy drop;

        ct state established,related accept
        iif "lo" accept
        ct state invalid drop

        # Allow ICMP/ICMPv6
        ip  protocol icmp  accept
        ip6 nexthdr  icmpv6 accept

        # Log dropped packets (rate limited)
        limit rate 3/minute burst 5 packets \
            log prefix "[nexus-drop] " flags all
    }

    chain forward {
        type filter hook forward priority filter; policy drop;
    }

    chain output {
        type filter hook output priority filter; policy accept;
    }
}
