# NexusOS update configuration
# Used by nexus-update tool inside the live system

# Update server base URL
# Set to empty string to disable remote update checks
UPDATE_SERVER="https://updates.nexusos.dev"

# Update channel: stable | testing | nightly
UPDATE_CHANNEL="stable"

# Whether to check for updates at login (via profile.d hook)
AUTO_CHECK_ON_LOGIN="false"

# Proxy (optional)
# HTTP_PROXY="http://proxy.example.com:3128"
# HTTPS_PROXY="http://proxy.example.com:3128"
