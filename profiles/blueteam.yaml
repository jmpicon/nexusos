# NexusOS — Blue Team profile
# Defensive security: monitoring, hardening, threat hunting.

name: blueteam
description: "Blue team — defensive security, threat hunting, monitoring"
version: "0.1.0"
desktop: xfce4

extends:
  - analyst

overlays:
  - blueteam

packages:
  # Endpoint detection and AV
  - clamav
  - clamav-daemon
  - rkhunter
  - chkrootkit

  # Vulnerability scanning
  - nikto
  - nmap

  # Hardening auditing
  - lynis
  - openscap-scanner
  - libopenscap8
  - aide
  - tripwire
  - debsums

  # Firewall and IDS
  - nftables
  - suricata
  - suricata-update
  - psad

  # Patch management
  - unattended-upgrades
  - apt-listchanges
  - apt-show-versions
  - needrestart

  # Identity and access
  - libpam-pwquality
  - libpam-google-authenticator
  - sssd
  - krb5-user

  # Secure communications
  - gnupg2
  - age

  # Monitoring
  - prometheus
  - prometheus-node-exporter
  - alertmanager
  - collectd

  # YARA
  - yara

  # Log collection and analysis
  - filebeat
  - logwatch
  - python3-systemd

packages_hardened:
  - libpam-pwquality
  - libpam-tmpdir
  - chkrootkit
  - rkhunter

packages_lab: []

config:
  monitoring_mode: "true"
