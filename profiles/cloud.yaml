# NexusOS — Cloud Security profile
# Cloud infrastructure security, container security, Kubernetes security.
# NOTE: kubectl, helm, terraform, trivy are installed via post-hook from official repos.

name: cloud
description: "Cloud/container security — K8s, Docker, Terraform, cloud-native tooling"
version: "0.1.0"
desktop: xfce4

extends:
  - analyst

overlays:
  - cloud

packages:
  # Container runtimes (all in Debian Bookworm)
  - podman
  - buildah
  - skopeo
  - runc
  - crun

  # Infrastructure as code (Debian repos)
  - ansible
  - python3-jinja2
  - python3-yaml

  # Secrets management (Debian repos)
  - age
  - pass
  - gnupg2

  # Network tools
  - nmap
  - masscan
  - curl
  - wget

  # API testing
  - httpie

  # Monitoring (Debian repos)
  - prometheus
  - prometheus-node-exporter
  - alertmanager
  - collectd

  # Scripting
  - python3
  - python3-pip
  - python3-venv
  - jq
  - yq
  - nodejs
  - npm

  # Git and pipeline
  - git
  - git-crypt

  # TLS/PKI
  - certbot
  - openssl

packages_hardened:
  - certbot
  - libpam-pwquality

packages_lab:
  - podman-compose
  - docker.io

config:
  cloud_focus: "multi-cloud"
  note: "kubectl/helm/terraform/trivy installed via post-cloud.sh hook"
