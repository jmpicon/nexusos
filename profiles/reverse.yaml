# NexusOS — Reverse Engineering profile
# Binary analysis, malware research, reversing tools.

name: reverse
description: "Reverse engineering — binary analysis, disassembly, debugging"
version: "0.1.0"
desktop: xfce4

extends:
  - core

overlays:
  - reverse

packages:
  # Desktop
  - xfce4
  - xfce4-terminal
  - lightdm
  - xorg
  - dbus-x11

  # Disassemblers and binary analysis
  # NOTE: Ghidra (NSA) must be installed manually: https://ghidra-sre.org
  - radare2
  - binutils
  - binwalk
  - file
  - hexedit
  - vim-common
  - bsdmainutils
  - elfutils
  - libelf-dev
  - patchelf

  # Debuggers
  - gdb
  - gdb-multiarch
  - lldb
  # NOTE: pwndbg/peda are gdb plugins installed via git in post-hook

  # Dynamic analysis
  - strace
  - ltrace
  - linux-perf
  - valgrind

  # Scripting and automation
  - python3
  - python3-pip
  - python3-venv
  - python3-capstone
  - python3-pefile
  - ipython3

  # Network analysis (for malware)
  - wireshark
  - tshark
  - tcpdump
  - ngrep

  # Sandbox helpers (static analysis)
  - yara
  - clamav
  - ssdeep

  # Emulation
  - qemu-user
  - qemu-user-static

  # Compilers and build tools
  - gcc
  - g++
  - clang
  - nasm
  - make
  - cmake
  - build-essential

  # Java (needed for Ghidra)
  - default-jdk

packages_hardened:
  - firejail
  - bubblewrap

packages_lab:
  - bochs
  - dosbox

config:
  sandbox_by_default: "false"
  java_heap: "4g"
